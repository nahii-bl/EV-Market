<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mike EV Requests</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS styles added smoothly to support status visibility and layout buttons */
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending { background-color: #f1c40f; color: #000; }
        .status-accepted { background-color: #2ecc71; color: #fff; }
        
        .request-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .button.success {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
        }
        .button.success:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html#home" class="brand" aria-label="Mikey EV home">
            <img src="auto-car-logo-template-vector-icon.webp" alt="">
            <span>Mike <strong>EV</strong></span>
        </a>
        <nav class="site-nav admin-nav" aria-label="Admin navigation">
            <a href="index.html">Website</a>
            <a href="index.html#contact">Contact</a>
        </nav>
    </header>

    <main class="admin-page">
        <section class="section">
            <div class="section-heading">
                <p class="eyebrow">Backend dashboard</p>
                <h1>Customer Requests</h1>
                <p class="hero-text">New form submissions from the Mikey EV website will appear here.</p>
            </div>

            <div class="requests-toolbar">
                <button class="button primary" type="button" id="refreshRequests">Refresh</button>
                <span id="requestCount">Loading...</span>
            </div>

            <div class="requests-list" id="requestsList"></div>
        </section>
    </main>

    <script>
        const list = document.querySelector("#requestsList");
        const count = document.querySelector("#requestCount");
        const refreshButton = document.querySelector("#refreshRequests");

        function formatDate(value) {
            if (!value) return "N/A";
            return new Date(value).toLocaleString();
        }

        // FEATURE: Accept customer request inside your local server
        async function acceptRequest(requestId) {
            try {
                const response = await fetch(`/api/requests/${requestId}/accept`, {
                    method: "POST"
                });

                if (response.ok) {
                    loadRequests(); // Reload view on success
                } else {
                    alert("Failed to accept request");
                }
            } catch (error) {
                console.error("Error accepting request:", error);
                alert("Error connecting to server backend system.");
            }
        }

        // FEATURE: Delete customer request inside your local server
        async function deleteRequest(requestId) {
            if (!confirm("Are you sure you want to delete this request?")) {
                return;
            }

            try {
                const response = await fetch(`/api/requests/${requestId}`, {
                    method: "DELETE"
                });

                if (response.ok) {
                    loadRequests();
                } else {
                    alert("Failed to delete request");
                }
            } catch (error) {
                console.error("Error deleting request:", error);
                alert("Error deleting request");
            }
        }

        function renderRequests(requests) {
            count.textContent = `${requests.length} request${requests.length === 1 ? "" : "s"}`;

            if (!requests.length) {
                list.innerHTML = '<article class="request-card"><p>No requests yet.</p></article>';
                return;
            }

            list.innerHTML = requests.map((request) => {
                const currentStatus = request.status || 'pending';
                const acceptButtonHtml = currentStatus === 'pending' 
                    ? `<button class="button success" type="button" onclick="acceptRequest('${request.id}')">Accept</button>`
                    : '';

                return `
                    <article class="request-card">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <h3>${request.name}</h3>
                                <p>${formatDate(request.createdAt)}</p>
                            </div>
                            <span class="status-badge status-${currentStatus}">${currentStatus}</span>
                        </div>
                        <dl>
                            <div><dt>Phone</dt><dd><a href="tel:${request.phone}">${request.phone}</a></dd></div>
                            <div><dt>Model</dt><dd>${request.model}</dd></div>
                            <div><dt>Message</dt><dd>${request.message || "No message"}</dd></div>
                        </dl>
                        <div class="request-actions">
                            ${acceptButtonHtml}
                            <button class="button danger" type="button" onclick="deleteRequest('${request.id}')">Delete</button>
                        </div>
                    </article>
                `;
            }).join("");
        }

        // FEATURE: Load records straight from the server
        async function loadRequests() {
            try {
                const response = await fetch("/api/requests");
                const requests = await response.json();
                renderRequests(requests);
            } catch {
                count.textContent = "Backend is not running";
                list.innerHTML = '<article class="request-card"><p>Start the server to see requests.</p></article>';
            }
        }

        refreshButton.addEventListener("click", loadRequests);
        loadRequests();
    </script>
</body>
</html>
