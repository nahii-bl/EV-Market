<script>
        const list = document.querySelector("#requestsList");
        const count = document.querySelector("#requestCount");
        const refreshButton = document.querySelector("#refreshRequests");

        function formatDate(value) {
            if (!value) return "N/A";
            return new Date(value).toLocaleString();
        }

        // FEATURE: Send Accept state to local Node API endpoint routing rule
        async function acceptRequest(requestId) {
            try {
                const response = await fetch(`/api/requests/${requestId}/accept`, {
                    method: "POST"
                });

                if (response.ok) {
                    loadRequests(); // Refresh layout views on success
                } else {
                    alert("Failed to accept request");
                }
            } catch (error) {
                console.error("Error accepting request:", error);
                alert("Error connecting to server backend system.");
            }
        }

        // FEATURE: Send Delete instruction to local Node API endpoint routing rule
        async function deleteRequest(requestId) {
            if (!confirm("Are you sure you want to delete this request?")) {
                return;
            }

            try {
                const response = await fetch(`/api/requests/${requestId}`, {
                    method: "DELETE"
                });

                if (response.ok) {
                    loadRequests();
                } else {
                    alert("Failed to delete request");
                }
            } catch (error) {
                console.error("Error deleting request:", error);
                alert("Error deleting request");
            }
        }

        function renderRequests(requests) {
            count.textContent = `${requests.length} request${requests.length === 1 ? "" : "s"}`;

            if (!requests.length) {
                list.innerHTML = '<article class="request-card"><p>No requests yet.</p></article>';
                return;
            }

            list.innerHTML = requests.map((request) => {
                const currentStatus = request.status || 'pending';
                const acceptButtonHtml = currentStatus === 'pending' 
                    ? `<button class="button success" style="background-color:#2ecc71; color:white; border:none; padding:5px 10px; margin-right:5px; cursor:pointer;" type="button" onclick="acceptRequest('${request.id}')">Accept</button>`
                    : '';

                return `
                    <article class="request-card" style="border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 4px;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <h3>${request.name}</h3>
                                <p>${formatDate(request.createdAt)}</p>
                            </div>
                            <span class="status-badge" style="padding: 3px 8px; border-radius: 3px; font-weight: bold; font-size: 0.8rem; background: ${currentStatus === 'accepted' ? '#2ecc71' : '#f1c40f'}; color: ${currentStatus === 'accepted' ? 'white' : 'black'};">${currentStatus}</span>
                        </div>
                        <dl>
                            <div><dt>Phone</dt><dd><a href="tel:${request.phone}">${request.phone}</a></dd></div>
                            <div><dt>Model</dt><dd>${request.model}</dd></div>
                            <div><dt>Message</dt><dd>${request.message || "No message"}</dd></div>
                        </dl>
                        <div style="margin-top: 10px;">
                            ${acceptButtonHtml}
                            <button class="button danger" type="button" onclick="deleteRequest('${request.id}')">Delete</button>
                        </div>
                    </article>
                `;
            }).join("");
        }

        // FEATURE: Query backend collection file properties
        async function loadRequests() {
            try {
                const response = await fetch("/api/requests");
                const requests = await response.json();
                renderRequests(requests);
            } catch {
                count.textContent = "Backend is not running";
                list.innerHTML = '<article class="request-card"><p>Start the server to see requests.</p></article>';
            }
        }

        refreshButton.addEventListener("click", loadRequests);
        loadRequests();
    </script>
