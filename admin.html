<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mike EV Requests</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Status Badge Styling */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-pending {
            background-color: #fef9c3;
            color: #713f12;
            border: 1px solid #fef08a;
        }
        .status-accepted {
            background-color: #dcfce7;
            color: #14532d;
            border: 1px solid #bbf7d0;
        }
        
        /* Action buttons grouping layout */
        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .request-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .button.success {
            background-color: #22c55e;
            color: white;
            border: none;
        }
        .button.success:hover {
            background-color: #16a34a;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html#home" class="brand" aria-label="Mikey EV home">
            <img src="auto-car-logo-template-vector-icon.webp" alt="">
            <span>Mike <strong>EV</strong></span>
        </a>
        <nav class="site-nav admin-nav" aria-label="Admin navigation">
            <a href="index.html">Website</a>
            <a href="index.html#contact">Contact</a>
        </nav>
    </header>

    <main class="admin-page">
        <section class="section">
            <div class="section-heading">
                <p class="eyebrow">Backend dashboard</p>
                <h1>Customer Requests</h1>
                <p class="hero-text">New form submissions from the Mikey EV website will appear here.</p>
            </div>

            <div class="requests-toolbar">
                <button class="button primary" type="button" id="refreshRequests">Refresh</button>
                <span id="requestCount">Loading...</span>
            </div>

            <div class="requests-list" id="requestsList"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Initialize your Supabase Client Connection
        const supabaseUrl = "https://qgfxojafkywfhpkvymwv.supabase.co";
        const supabaseKey = "sb_publishable_fbk1dk-QWn2rhhCLzqOxlw_c9tsbQ3p";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const list = document.querySelector("#requestsList");
        const count = document.querySelector("#requestCount");
        const refreshButton = document.querySelector("#refreshRequests");

        function formatDate(value) {
            if (!value) return "N/A";
            return new Date(value).toLocaleString();
        }

        // Security best practice: Prevents bad actors from executing XSS injects
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // FEATURE: Accept / Process customer requests
        async function acceptRequest(requestId) {
            try {
                const { error } = await supabase
                    .from("customer_request")
                    .update({ status: 'accepted' }) // Mutates status to 'accepted'
                    .eq("id", requestId);

                if (error) throw error;
                loadRequests(); // UI layout update reload
            } catch (error) {
                console.error("Error accepting request:", error);
                alert("Could not accept request. Make sure you added a 'status' text column to your Supabase table schema!");
            }
        }

        // FEATURE: Delete entry row directly from database table
        async function deleteRequest(requestId) {
            if (!confirm("Are you sure you want to delete this request?")) {
                return;
            }

            try {
                const { error } = await supabase
                    .from("customer_request")
                    .delete()
                    .eq("id", requestId);

                if (error) throw error;
                loadRequests();
            } catch (error) {
                console.error("Error deleting request:", error);
                alert("Error deleting request: " + error.message);
            }
        }

        // Renders markup layout strings dynamically 
        function renderRequests(requests) {
            count.textContent = `${requests.length} request${requests.length === 1 ? "" : "s"}`;

            if (!requests.length) {
                list.innerHTML = '<article class="request-card"><p>No requests yet.</p></article>';
                return;
            }

            list.innerHTML = requests.map((request) => {
                // If the column status item doesn't exist yet, gracefully fall back to 'pending'
                const currentStatus = request.status || 'pending';
                
                // Hide accept action if request row status is already flagged processed
                const acceptBtn = currentStatus === 'pending'
                    ? `<button class="button success" type="button" onclick="acceptRequest('${request.id}')">Accept</button>`
                    : '';

                return `
                    <article class="request-card">
                        <div class="request-header">
                            <div>
                                <h3>${escapeHtml(request.name)}</h3>
                                <p>${formatDate(request.created_at || request.createdAt)}</p>
                            </div>
                            <span class="status-badge status-${currentStatus}">${currentStatus}</span>
                        </div>
                        <dl>
                            <div><dt>Phone</dt><dd><a href="tel:${request.phone}">${escapeHtml(request.phone)}</a></dd></div>
                            <div><dt>Model</dt><dd>${escapeHtml(request.model)}</dd></div>
                            <div><dt>Message</dt><dd>${escapeHtml(request.message) || "No message"}</dd></div>
                        </dl>
                        <div class="request-actions">
                            ${acceptBtn}
                            <button class="button danger" type="button" onclick="deleteRequest('${request.id}')">Delete</button>
                        </div>
                    </article>
                `;
            }).join("");
        }

        // Queries the collection of objects back from the database table provider
        async function loadRequests() {
            count.textContent = "Loading...";
            try {
                const { data, error } = await supabase
                    .from("customer_request")
                    .select("*")
                    .order("id", { ascending: false });

                if (error) throw error;
                renderRequests(data);
            } catch (error) {
                console.error("Error fetching requests:", error);
                count.textContent = "Error loading data";
                list.innerHTML = `<article class="request-card"><p style="color: red;">Error: ${error.message}</p></article>`;
            }
        }

        refreshButton.addEventListener("click", loadRequests);
        loadRequests();
    </script>
</body>
</html>
